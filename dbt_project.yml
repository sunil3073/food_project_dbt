

name: 'dbt_food_delivery'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'dbt_food_delivery'


model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"



models:
  dbt_food_delivery:
    staging:
       +materialized: view

    intermediate:
      +schema: intermediate
      +materialized: table

    marts:
      +schema: marts
      +materialized: table
       
